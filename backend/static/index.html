<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Management MVP</title>
    <style>
      :root {
        color-scheme: light;
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
        --surface: #f7f8fb;
        --card: #ffffff;
        --stroke: rgba(3, 33, 71, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(32, 157, 215, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(117, 57, 145, 0.12), transparent 28%),
          var(--surface);
        color: var(--navy-dark);
      }

      main {
        width: min(680px, 100%);
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: 28px;
        padding: 40px;
        box-shadow: 0 20px 50px rgba(3, 33, 71, 0.12);
      }

      .eyebrow {
        margin: 0;
        color: var(--gray-text);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 12px;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--gray-text);
        line-height: 1.7;
      }

      .status {
        margin-top: 28px;
        padding: 18px 20px;
        border-radius: 18px;
        border: 1px solid var(--stroke);
        background: rgba(32, 157, 215, 0.06);
      }

      .status strong {
        color: var(--primary-blue);
      }

      .loading {
        color: var(--secondary-purple);
      }

      .error {
        color: #b42318;
      }

      code {
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(236, 173, 10, 0.16);
        color: var(--navy-dark);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Part 2 Scaffold</p>
      <h1>Hello from the Project Management MVP</h1>
      <p>
        This temporary page is being served by FastAPI from inside the Docker
        container. It also performs a live request to <code>/api/health</code>
        so we can verify static serving and backend API connectivity together.
      </p>
      <section class="status" aria-live="polite">
        <strong>API status:</strong>
        <span id="status-text" class="loading">Checking backend health...</span>
      </section>
    </main>

    <script>
      const statusText = document.getElementById("status-text");

      async function loadHealth() {
        try {
          const response = await fetch("/api/health");
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          statusText.textContent = `${payload.status} (${payload.service})`;
          statusText.className = "";
        } catch (error) {
          statusText.textContent = `Request failed: ${error.message}`;
          statusText.className = "error";
        }
      }

      loadHealth();
    </script>
  </body>
</html>
